name: NFL news bot

# Runs the bot on a schedule and commits the updated de-duplication record
# (state.json) back to the repo so each fresh run remembers what it posted.
on:
  schedule:
    # Every 15 minutes. Adjust to taste / your X API rate tier.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

# Allow the job to push the updated state file back to the branch.
permissions:
  contents: write

# Prevent overlapping runs from racing on the committed state file.
concurrency:
  group: nfl-news-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Optional: override the summarisation model (defaults to claude-opus-4-8).
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
        run: python -m nflbot.bot

      - name: Commit updated state
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name "nfl-news-bot"
            git config user.email "noreply@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update posted-items state"
            git push
          else
            echo "No state changes to commit."
          fi
